                { type: "choice", question: "下列关于色环电阻的识别,棕红橙黄四个色环,阻值是", options: ["A. 12kΩ", "B. 23kΩ", "C. 12Ω", "D. 23Ω"], answer: "A" },

                { type: "choice", question: "下列关于电路电流过大的原因,说法错误的是", options: ["A. 短路,就是火线和零线直接接触,电阻很小,电流很大", "B. 过载,就是用电器的总功率过大,导致电流过大", "C. 漏电,就是电流从地线流走,也会导致电流过大", "D. 以上都是"], answer: "C" },
                { type: "choice", question: "下列关于安全用电的说法,错误的是", options: ["A. 不接触低压带电体", "B. 不靠近高压带电体", "C. 可以用铜丝代替保险丝", "D. 不用湿手触摸开关"], answer: "C" },
                { type: "choice", question: "下列关于电工测量的说法,正确的是", options: ["A. 测量电压的时候,要并联在电路中", "B. 测量电流的时候,要串联在电路中", "C. 测量功率的时候,要把电压和电流都测出来", "D. 以上都对"], answer: "D" },
                { type: "choice", question: "下列关于三相负载的测量,说法正确的是", options: ["A. 可以测量三相的电压", "B. 可以测量三相的电流", "C. 可以测量三相的功率", "D. 以上都对"], answer: "D" },
                { type: "choice", question: "下列关于导线的连接,说法错误的是", options: ["A. 导线连接的时候,要把芯线绞紧", "B. 连接完之后,要包上绝缘胶带", "C. 不同截面的导线可以直接连接", "D. 多股导线连接的时候,要镀锡,防止松散"], answer: "C" },
                { type: "choice", question: "下列关于焊接的说法,错误的是", options: ["A. 焊接的时候,要先加热元件和焊盘", "B. 然后上焊锡,让焊锡自动流过去", "C. 焊锡越多,焊接越好", "D. 焊接完之后,要等焊锡冷却,再动元件"], answer: "C" },
                { type: "choice", question: "下列关于接近开关的说法,正确的是", options: ["A. 可以不用接触,就可以检测物体", "B. 必须接触,才能检测物体", "C. 只能检测金属物体", "D. 只能检测塑料物体"], answer: "A" },
                { type: "choice", question: "下列关于光电传感器的说法,正确的是", options: ["A. 可以检测物体的有无", "B. 可以检测物体的颜色", "C. 可以检测物体的距离", "D. 以上都对"], answer: "D" },
                { type: "choice", question: "下列关于超声波传感器的说法,正确的是", options: ["A. 可以测量距离", "B. 可以测量温度", "C. 可以测量力", "D. 可以测量光"], answer: "A" },
                { type: "choice", question: "下列关于温度传感器的说法,正确的是", options: ["A. 可以测量温度", "B. 可以测量距离", "C. 可以测量力", "D. 可以测量光"], answer: "A" },
                { type: "choice", question: "下列关于力传感器的说法,正确的是", options: ["A. 可以测量力的大小", "B. 可以测量距离", "C. 可以测量温度", "D. 可以测量光"], answer: "A" },
                { type: "choice", question: "下列关于电工工具的说法,错误的是", options: ["A. 螺丝刀可以用来拧螺丝", "B. 剥线钳可以用来剥导线的绝缘皮", "C. 钢丝钳可以用来剪导线", "D. 电工刀可以用来削苹果,反正都是刀"], answer: "D" }
            ];

            // ---------- 应用状态 ----------
            let shuffledQuestions = [...questions];
            let currentIndex = 0;
            let userAnswers = {}; // key: index, value: 用户答案首字符

            // 随机打乱数组
            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            // 初始化打乱
            shuffleArray(shuffledQuestions);

            // DOM元素
            const titleLabel = document.getElementById('titleLabel');
            const questionText = document.getElementById('questionText');
            const optionsContainer = document.getElementById('optionsContainer');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const shuffleBtn = document.getElementById('shuffleBtn');
            const statsBtn = document.getElementById('statsBtn');
            const statsModal = document.getElementById('statsModal');
            const statsContent = document.getElementById('statsContent');
            const closeModalBtn = document.getElementById('closeModalBtn');

            // 渲染当前题目
            function renderQuestion() {
                if (!shuffledQuestions.length || currentIndex >= shuffledQuestions.length) {
                    titleLabel.textContent = '🎉 恭喜！已刷完所有题目';
                    questionText.textContent = '没有更多题目了，点击“重新随机”开始新一轮刷题吧。';
                    optionsContainer.innerHTML = '';
                    return;
                }

                const q = shuffledQuestions[currentIndex];
                titleLabel.textContent = `第 ${currentIndex + 1} 题 / 共 ${shuffledQuestions.length} 题`;
                questionText.textContent = q.question;

                // 生成选项按钮
                optionsContainer.innerHTML = '';
                const options = q.options;
                const correctAnswer = q.answer;
                const userAns = userAnswers[currentIndex] || null;

                options.forEach((optText, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = optText;
                    
                    // 获取选项首字符（判断题是“对”/“错”，选择题是A/B/C/D）
                    const optKey = optText.charAt(0);
                    
                    // 如果已经答过，显示颜色并禁用
                    if (userAns !== null && userAns !== undefined) {
                        btn.disabled = true;
                        if (optKey === correctAnswer) {
                            btn.classList.add('correct');
                        } else if (optKey === userAns) {
                            btn.classList.add('wrong');
                        }
                    } else {
                        // 未答过，绑定点击事件
                        btn.addEventListener('click', () => handleOptionClick(idx, optKey));
                    }
                    
                    optionsContainer.appendChild(btn);
                });
            }

            // 处理选项点击
            function handleOptionClick(optIndex, optKey) {
                const q = shuffledQuestions[currentIndex];
                // 记录用户答案
                userAnswers[currentIndex] = optKey;
                // 重新渲染当前题目以显示颜色
                renderQuestion();
            }

            // 上一题
            function prevQuestion() {
                if (currentIndex > 0) {
                    currentIndex--;
                    renderQuestion();
                }
            }

            // 下一题
            function nextQuestion() {
                if (currentIndex < shuffledQuestions.length - 1) {
                    currentIndex++;
                    renderQuestion();
                }
            }

            // 重新随机
            function reshuffleQuestions() {
                shuffledQuestions = [...questions];
                shuffleArray(shuffledQuestions);
                currentIndex = 0;
                userAnswers = {};
                renderQuestion();
                alert('题目已重新随机打乱，开始新的刷题吧！');
            }

            // 显示统计
            function showStats() {
                const total = shuffledQuestions.length;
                const answered = Object.keys(userAnswers).length;
                if (answered === 0) {
                    alert('你还没有回答任何题目哦，快去刷题吧！');
                    return;
                }

                let correct = 0;
                let wrong = 0;
                for (const [idxStr, ans] of Object.entries(userAnswers)) {
                    const idx = parseInt(idxStr, 10);
                    const q = shuffledQuestions[idx];
                    if (q && ans === q.answer) {
                        correct++;
                    } else {
                        wrong++;
                    }
                }

                const accuracy = ((correct / answered) * 100).toFixed(2);
                statsContent.innerHTML = `
                    <p>总题目数：<span class="stats-highlight">${total} 题</span></p>
                    <p>已答题数：<span class="stats-highlight">${answered} 题</span></p>
                    <p>✅ 做对：<span class="stats-highlight">${correct} 题</span></p>
                    <p>❌ 做错：<span class="stats-highlight">${wrong} 题</span></p>
                    <p>📈 正确率：<span class="stats-highlight">${accuracy}%</span></p>
                    <p style="margin-top:15px; color:#2563eb;">继续加油，争取正确率100%！</p>
                `;
                statsModal.classList.add('active');
            }

            // 关闭模态框
            function closeModal() {
                statsModal.classList.remove('active');
            }

            // 事件绑定
            prevBtn.addEventListener('click', prevQuestion);
            nextBtn.addEventListener('click', nextQuestion);
            shuffleBtn.addEventListener('click', reshuffleQuestions);
            statsBtn.addEventListener('click', showStats);
            closeModalBtn.addEventListener('click', closeModal);
            statsModal.addEventListener('click', function(e) {
                if (e.target === statsModal) {
                    closeModal();
                }
            });

            // 键盘左右键导航（可选）
            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    prevQuestion();
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    nextQuestion();
                }
            });

            // 初始渲染
            renderQuestion();
        })();
    </script>
